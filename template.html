<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Git &amp; GitHub — for humans and their agents</title>
  <link rel="stylesheet" href="vendor/reveal/dist/reset.css">
  <link rel="stylesheet" href="vendor/reveal/dist/reveal.css">
  <link rel="stylesheet" href="vendor/reveal/dist/theme/white.css" id="theme">
  <link rel="stylesheet" href="vendor/reveal/plugin/highlight/monokai.css">
  <style>
{{THEME_CSS}}
  </style>
</head>
<body>
  <div class="reveal">
    <div class="slides">
{{MODULES}}
    </div>
  </div>
  <script src="vendor/reveal/dist/reveal.js"></script>
  <script src="vendor/reveal/plugin/notes/notes.js"></script>
  <script src="vendor/reveal/plugin/highlight/highlight.js"></script>
  <script src="vendor/reveal/plugin/zoom/zoom.js"></script>
  <script src="vendor/reveal/plugin/search/search.js"></script>
  <script>
    (function () {
      if (!window.Reveal) {
        document.documentElement.classList.add('reveal-load-failed');
        return;
      }

      var plugins = [
        window.RevealNotes,
        window.RevealHighlight,
        window.RevealZoom,
        window.RevealSearch
      ].filter(Boolean);

      window.Reveal.initialize({
        hash: true,
        history: true,
        slideNumber: 'c/t',
        transition: 'slide',
        backgroundTransition: 'fade',
        controls: true,
        progress: true,
        center: false,
        width: 1280,
        height: 720,
        margin: 0.06,
        minScale: 0.2,
        maxScale: 1.5,
        plugins: plugins
      });
    }());
  </script>
</body>
</html>
